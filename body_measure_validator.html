<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>量体数据参考器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f5f7fa;
    color: #333;
    line-height: 1.6;
  }
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px;
  }
  header {
    text-align: center;
    padding: 36px 20px 28px;
    background: #ffffff;
    border-bottom: 3px solid #667eea;
    margin-bottom: 20px;
  }
  header h1 {
    font-size: 1.9rem;
    font-weight: 700;
    color: #2c3e50;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  header p {
    color: #7f8c8d;
    font-size: 0.95rem;
  }

  .card {
    background: white;
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    border: 1px solid #eef0f4;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid #f0f2f5;
  }
  .card-header .icon {
    font-size: 1.3rem;
  }
  .card-header h2 {
    font-size: 1.15rem;
    font-weight: 600;
    color: #34495e;
  }
  .required-badge {
    display: inline-block;
    background: #ff4757;
    color: white;
    font-size: 0.65rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .optional-badge {
    background: #2ed573;
  }
  .key-badge {
    color: #ff4757;
    font-weight: 700;
  }

  .hint-box {
    background: #f8f9fc;
    border-left: 4px solid #667eea;
    padding: 14px 18px;
    border-radius: 0 10px 10px 0;
    font-size: 0.85rem;
    color: #555;
    margin-bottom: 20px;
    line-height: 1.7;
  }
  .data-source {
    font-size: 0.75rem;
    color: #889;
    padding: 2px 6px;
    border-radius: 4px;
    background: #f0f2f5;
    display: inline-block;
  }
  .data-source.gb { color: #2ed573; background: #f0fff4; }
  .data-source.pm { color: #ffa502; background: #fffbf0; }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 18px;
  }
  .field-group {
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .field-group label {
    display: block;
    font-weight: 600;
    font-size: 0.85rem;
    margin-bottom: 6px;
    color: #444;
  }
  .field-group input, .field-group select {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #e0e3e8;
    border-radius: 10px;
    font-size: 1rem;
    background: #fafbfc;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    margin-top: auto;
  }
  .field-group input:focus, .field-group select:focus {
    outline: none;
    border-color: #667eea;
    background: white;
    box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
  }
  .field-group .tip-inline {
    font-size: 0.72rem;
    color: #889;
    font-weight: 400;
    margin-left: 4px;
  }

  .divider {
    height: 1px;
    background: #eef0f4;
    margin: 24px 0;
  }

  .optional-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .optional-item {
    background: #fafbfc;
    border: 1.5px solid #e8ebf0;
    border-radius: 12px;
    padding: 16px;
    transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s;
  }
  .optional-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    border-color: #d0d5dd;
  }
  .optional-item .field-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: #34495e;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .optional-item .predicted {
    font-size: 0.75rem;
    color: #889;
    font-weight: 400;
    background: #f0f2f5;
    padding: 2px 8px;
    border-radius: 6px;
  }
  .optional-item input {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid #e0e3e8;
    border-radius: 8px;
    font-size: 0.95rem;
    background: white;
    transition: border-color 0.2s, background 0.2s;
  }
  .optional-item input:focus {
    outline: none;
    border-color: #667eea;
  }
  .optional-item input.green { border-color: #2ed573; background: #f0fff4; }
  .optional-item input.yellow { border-color: #ffa502; background: #fffbf0; }
  .optional-item input.red { border-color: #ff4757; background: #fff5f5; }

  .indicator-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }
  .indicator-bar {
    flex: 1;
    height: 5px;
    border-radius: 3px;
    background: #e8ebf0;
    position: relative;
    overflow: hidden;
  }
  .indicator-bar .fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s, background 0.3s;
    width: 0%;
  }
  .indicator-bar .fill.green { background: #2ed573; }
  .indicator-bar .fill.yellow { background: #ffa502; }
  .indicator-bar .fill.red { background: #ff4757; }
  .indicator-text {
    font-size: 0.72rem;
    color: #889;
    min-width: 85px;
    text-align: right;
    white-space: nowrap;
  }

  .legend-bar {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 18px;
    padding: 12px 16px;
    background: #f8f9fc;
    border-radius: 10px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: #666;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .dot.green { background: #2ed573; }
  .dot.yellow { background: #ffa502; }
  .dot.red { background: #ff4757; }
  .dot.gray { background: #ccc; }

  .summary {
    text-align: center;
    padding: 18px;
    background: #f8f9fc;
    border-radius: 12px;
    border: 1.5px solid #eef0f4;
    font-size: 0.9rem;
    color: #555;
  }
  .summary b {
    color: #34495e;
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    color: #889;
    padding: 40px 20px;
    font-size: 0.95rem;
  }
  .empty-state .icon {
    font-size: 2.5rem;
    margin-bottom: 10px;
    display: block;
  }

  @media (max-width: 600px) {
    .container { padding: 10px; }
    header { padding: 24px 16px 20px; }
    header h1 { font-size: 1.5rem; }
    .card { padding: 18px; }
    .form-grid { grid-template-columns: 1fr; }
    .optional-grid { grid-template-columns: 1fr; }
    .legend-bar { gap: 10px; padding: 10px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📏 量体数据参考器</h1>
    <p>输入8项基础数据，智能推断其余15项的合理范围</p>
  </header>

  <div class="card">
    <div class="card-header">
      <span class="icon">📝</span>
      <h2>基础数据</h2>
      <span class="required-badge">必填</span>
    </div>
    <div class="hint-box">
      请填写以下8项数据。其中 <span class="key-badge">手腕围</span> 和 <span class="key-badge">头长</span> 为关键项：手腕围反映骨架大小，头长是身体比例的最佳基准。
    </div>
    <div class="form-grid">
      <div class="field-group">
        <label>身高 (cm)</label>
        <input type="number" id="h" oninput="calculateAll()">
      </div>
      <div class="field-group">
        <label>性别</label>
        <select id="gender" onchange="calculateAll()">
          <option value="男">男</option>
          <option value="女">女</option>
        </select>
      </div>
      <div class="field-group">
        <label>体重 (kg)</label>
        <input type="number" id="w" oninput="calculateAll()">
      </div>
      <div class="field-group">
        <label>胸围 (cm)</label>
        <input type="number" id="bust" oninput="calculateAll()">
      </div>
      <div class="field-group">
        <label>腰围 (cm)</label>
        <input type="number" id="waist" oninput="calculateAll()">
      </div>
      <div class="field-group">
        <label>臀围 (cm)</label>
        <input type="number" id="hip" oninput="calculateAll()">
      </div>
      <div class="field-group">
        <label>手腕围 (cm) <span class="key-badge">★</span></label>
        <input type="number" id="wrist" oninput="calculateAll()">
      </div>
      <div class="field-group">
        <label>头长 (cm) <span class="key-badge">★</span> <span class="tip-inline">头顶正中至下巴尖</span></label>
        <input type="number" id="headlen" oninput="calculateAll()">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="icon">📊</span>
      <h2>数据验证</h2>
      <span class="required-badge optional-badge">选填</span>
    </div>
    <div class="hint-box">
      <span class="data-source gb">■ 绿色标签</span>：公式基于 <b>GB/T 10000-1988</b> 中国成年人人体尺寸国标，可信度较高<br>
      <span class="data-source pm">■ 黄色标签</span>：公式基于 <b>PMC/学术文献小样本</b>，仅供参考，不可作为医学或法律标准<br>
      输入实测数据后，系统将显示预测值并给出状态提示：<b>绿</b> 正常、<b>黄</b> 偏离、<b>红</b> 异常。
    </div>
    <div class="legend-bar">
      <div class="legend-item"><div class="dot green"></div> 正常</div>
      <div class="legend-item"><div class="dot yellow"></div> 偏离</div>
      <div class="legend-item"><div class="dot red"></div> 异常</div>
      <div class="legend-item"><div class="dot gray"></div> 未输入</div>
    </div>
    <div class="optional-grid" id="optionalGrid">
      <!-- JS生成 -->
    </div>
  </div>

  <div class="card summary" id="summaryBox" style="display:none;">
    <div id="summaryText"></div>
  </div>
</div>

<script>
// ===== 数据来源说明 =====
// GB/T 10000-1988: 中国成年人人体尺寸国家标准（47项长度/围度数据，6区3年龄段）
// PMC: PubMed Central 学术文献，小样本（通常<500人），仅供参考
// 公式中的 (g==='男'?X:Y) 为性别修正系数，基于GB/T 10000男女差异校准

const fields = [
  // === 长度类：基于 GB/T 10000-1988 校准 ===
  { id: "armlen",   name: "手臂长",       unit: "cm", sd: 2.0, source: "gb",
    predict: (h,w,g,bust,waist,hip,bmi,wrist,headlen)=>
      h * (g==='男'?0.328:0.320) + (w-60)*0.01 + (g==='男'?0.5:-0.5) },
  { id: "leg",      name: "腿长",         unit: "cm", sd: 2.9, source: "gb",
    predict: (h,w,g,bust,waist,hip,bmi,wrist,headlen)=>
      h * (g==='男'?0.497:0.498) + (w-60)*0.01 },
  { id: "crotch",   name: "头顶到裆部",   unit: "cm", sd: 2.5, source: "gb",
    predict: (h,w,g,bust,waist,hip,bmi,wrist,headlen)=>
      h * (g==='男'?0.529:0.534) + (w-60)*0.01 },
  { id: "shoulder", name: "肩宽",         unit: "cm", sd: 2.0, source: "gb",
    predict: (h,w,g,bust,waist,hip,bmi,wrist,headlen)=>
      h * (g==='男'?0.249:0.247) + (w-60)*0.02 + (g==='男'?0.5:-0.5) },
  { id: "torso",    name: "咽喉-裆部-颈背", unit: "cm", sd: 5.0, source: "pm",
    predict: (h,w,g,bust,waist,hip,bmi,wrist,headlen)=>
      h * 0.92 + (w-60)*0.05 + (g==='男'?1.0:0) },
  { id: "head",     name: "头围",         unit: "cm", sd: 2.5, source: "pm",
    predict: (h,w,g,bust,waist,hip,bmi,wrist,headlen)=>
      headlen * 2.35 + (g==='男'?0.5:-0.3) },

  // === 围度类：基于 PMC 文献小样本，仅供参考 ===
  { id: "upperarm", name: "上臂围",       unit: "cm", sd: 2.5, source: "pm",
    predict: (h,w,g,bust,waist,hip,bmi,wrist,headlen)=>
      bust * 0.339 + (bmi-21)*0.3 + (g==='男'?0.5:-0.3) },
  { id: "forearm",  name: "前臂围",       unit: "cm", sd: 2.5, source: "pm",
    predict: (h,w,g,bust,waist,hip,bmi,wrist,headlen)=>
      wrist + 9 + (w-60)*0.10 + (h-164)*0.08 + (g==='男'?0.5:-0.5) },
  { id: "thigh",    name: "大腿围",       unit: "cm", sd: 5.0, source: "pm",
    predict: (h,w,g,bust,waist,hip,bmi,wrist,headlen)=>
      hip * 0.582 + (w-60)*0.05 + (h-164)*0.05 },
  { id: "knee",     name: "膝盖围",       unit: "cm", sd: 2.5, source: "pm",
    predict: (h,w,g,bust,waist,hip,bmi,wrist,headlen)=>
      hip * 0.38 + (h-164)*0.05 + (w-60)*0.03 },
  { id: "calf",     name: "小腿围",       unit: "cm", sd: 2.8, source: "pm",
    predict: (h,w,g,bust,waist,hip,bmi,wrist,headlen)=>
      (hip * 0.582) * 0.682 + (w-60)*0.02 },
  { id: "ankle",    name: "脚踝围",       unit: "cm", sd: 2.0, source: "pm",
    predict: (h,w,g,bust,waist,hip,bmi,wrist,headlen)=>
      wrist * (g==='男'?1.35:1.45) + (h-164)*0.05 + (w-60)*0.02 + (g==='男'?0:-0.2) },
  { id: "neck",     name: "颈围",         unit: "cm", sd: 2.0, source: "pm",
    predict: (h,w,g,bust,waist,hip,bmi,wrist,headlen)=>
      bust * 0.41 + 2 + (bmi-21)*0.5 },
  { id: "foot",     name: "脚长",         unit: "cm", sd: 1.5, source: "pm",
    predict: (h,w,g,bust,waist,hip,bmi,wrist,headlen)=>
      h * 0.133 + (g==='男'?0.2:-0.2) },
  { id: "finger",   name: "手指长",       unit: "cm", sd: 1.0, source: "pm",
    predict: (h,w,g,bust,waist,hip,bmi,wrist,headlen)=>
      h/20 + (wrist-15.7)*0.2 + (g==='男'?0.3:-0.2) },
];

function getInputs() {
  const h = parseFloat(document.getElementById('h').value);
  const w = parseFloat(document.getElementById('w').value);
  const g = document.getElementById('gender').value;
  const bust = parseFloat(document.getElementById('bust').value);
  const waist = parseFloat(document.getElementById('waist').value);
  const hip = parseFloat(document.getElementById('hip').value);
  const wrist = parseFloat(document.getElementById('wrist').value);
  const headlen = parseFloat(document.getElementById('headlen').value);
  const bmi = (!isNaN(h) && !isNaN(w) && h > 0) ? w / ((h/100)**2) : NaN;
  const valid = !isNaN(h)&&!isNaN(w)&&!isNaN(bust)&&!isNaN(waist)&&!isNaN(hip)&&!isNaN(wrist)&&!isNaN(headlen);
  return { h, w, g, bust, waist, hip, bmi, wrist, headlen, valid };
}

function getStatus(actual, predicted, sd, source) {
  if (isNaN(actual)) return { cls: 'gray', pct: 0, text: `预测: ${predicted.toFixed(1)}` };
  const diff = Math.abs(actual - predicted);
  const pct = diff / predicted * 100;
  // 长度类(GB)用1SD/2SD，围度类(PM)用2SD/3SD更宽松
  const sdNormal = source === 'gb' ? sd : sd * 1.5;
  const sdWarn = source === 'gb' ? sd * 2 : sd * 3;
  if (diff <= sdNormal) {
    return { cls: 'green', pct: Math.min(pct*5, 100), text: `${pct.toFixed(1)}% 偏差 ✅` };
  } else if (diff <= sdWarn) {
    return { cls: 'yellow', pct: Math.min(pct*5, 100), text: `${pct.toFixed(1)}% 偏离 ⚠️` };
  } else {
    return { cls: 'red', pct: Math.min(pct*5, 100), text: `${pct.toFixed(1)}% 异常 ❌` };
  }
}

let gridInitialized = false;

function initGrid() {
  const grid = document.getElementById('optionalGrid');
  grid.innerHTML = '';
  for (const f of fields) {
    const srcBadge = f.source === 'gb'
      ? '<span class="data-source gb" title="基于GB/T 10000-1988中国成年人人体尺寸国标">国标</span>'
      : '<span class="data-source pm" title="基于PMC学术文献小样本，仅供参考">文献</span>';
    const div = document.createElement('div');
    div.className = 'optional-item';
    div.id = 'wrap_' + f.id;
    div.innerHTML = `
      <div class="field-title">
        <span>${f.name} ${srcBadge}</span>
        <span class="predicted" id="pred_${f.id}">--</span>
      </div>
      <input type="number" id="opt_${f.id}" placeholder="实测 ${f.unit}" step="0.1" oninput="updateField('${f.id}')">
      <div class="indicator-wrap">
        <div class="indicator-bar">
          <div class="fill" id="fill_${f.id}" style="width:0%"></div>
        </div>
        <div class="indicator-text" id="text_${f.id}">--</div>
      </div>
    `;
    grid.appendChild(div);
  }
  gridInitialized = true;
}

function updateField(fieldId) {
  const { h, w, g, bust, waist, hip, bmi, wrist, headlen, valid } = getInputs();
  if (!valid) return;
  const f = fields.find(x => x.id === fieldId);
  const pred = f.predict(h, w, g, bust, waist, hip, bmi, wrist, headlen);
  const el = document.getElementById('opt_' + fieldId);
  const actual = parseFloat(el.value);
  const st = getStatus(actual, pred, f.sd, f.source);

  document.getElementById('pred_' + fieldId).textContent = `预测: ${pred.toFixed(1)} ${f.unit}`;
  const fill = document.getElementById('fill_' + fieldId);
  fill.className = 'fill ' + st.cls;
  fill.style.width = st.cls === 'gray' ? '0%' : Math.max(8, st.pct) + '%';
  document.getElementById('text_' + fieldId).textContent = st.text;
  el.className = st.cls === 'gray' ? '' : st.cls;

  updateSummary();
}

function updateSummary() {
  let greenCount = 0, yellowCount = 0, redCount = 0, totalFilled = 0;
  for (const f of fields) {
    const el = document.getElementById('opt_' + f.id);
    if (el && el.value !== '') {
      totalFilled++;
      const cls = el.className;
      if (cls.includes('green')) greenCount++;
      else if (cls.includes('yellow')) yellowCount++;
      else if (cls.includes('red')) redCount++;
    }
  }
  const summary = document.getElementById('summaryBox');
  const summaryText = document.getElementById('summaryText');
  if (totalFilled > 0) {
    summary.style.display = 'block';
    summaryText.innerHTML = `
      <b>数据验证汇总</b>：已填 ${totalFilled} / ${fields.length} 项 &nbsp;|&nbsp;
      <span style="color:#2ed573">正常 ${greenCount}</span> &nbsp;
      <span style="color:#ffa502">偏离 ${yellowCount}</span> &nbsp;
      <span style="color:#ff4757">异常 ${redCount}</span>
    `;
  } else {
    summary.style.display = 'none';
  }
}

function calculateAll() {
  const { h, w, g, bust, waist, hip, bmi, wrist, headlen, valid } = getInputs();
  const grid = document.getElementById('optionalGrid');
  const summary = document.getElementById('summaryBox');

  if (!valid) {
    grid.innerHTML = '<div class="empty-state"><span class="icon">📝</span>请先填写上方8个必填项</div>';
    gridInitialized = false;
    summary.style.display = 'none';
    return;
  }

  if (!gridInitialized) {
    initGrid();
  }

  for (const f of fields) {
    const pred = f.predict(h, w, g, bust, waist, hip, bmi, wrist, headlen);
    const el = document.getElementById('opt_' + f.id);
    let actual = NaN;
    if (el && el.value !== '') actual = parseFloat(el.value);

    const st = getStatus(actual, pred, f.sd, f.source);

    document.getElementById('pred_' + f.id).textContent = `预测: ${pred.toFixed(1)} ${f.unit}`;
    const fill = document.getElementById('fill_' + f.id);
    fill.className = 'fill ' + st.cls;
    fill.style.width = st.cls === 'gray' ? '0%' : Math.max(8, st.pct) + '%';
    document.getElementById('text_' + f.id).textContent = st.text;
    if (el) el.className = st.cls === 'gray' ? '' : st.cls;
  }

  updateSummary();
}

window.onload = calculateAll;
</script>
</body>
</html>
